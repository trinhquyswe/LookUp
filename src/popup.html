<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LookUp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
    <script type="module" src="/popup.js" defer></script>
  </head>
  <body>
    <div class="card" id="card">
      <!-- Header row -->
      <div class="card-header">
        <span class="badge">
          <svg viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13L11 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          LookUp
        </span>
        <button id="btn-close" class="icon-btn" title="Dismiss">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Word display -->
      <div class="word-wrap">
        <p id="word-text" class="word"></p>
        <p id="no-word" class="no-word hidden">No word found under cursor</p>
      </div>

      <!-- Actions -->
      <div class="card-footer">
        <button id="btn-copy" class="action-btn">
          <svg viewBox="0 0 16 16" fill="none">
            <rect x="6" y="6" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 10H2a1 1 0 01-1-1V2a1 1 0 011-1h7a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Copy
        </button>
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>
    </div>
  </body>
</html>
