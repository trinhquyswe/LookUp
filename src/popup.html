<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LookUp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
    <script type="module" src="/popup.js" defer></script>
  </head>
  <body>
    <div class="card" id="card">
      <!-- Header row -->
      <div class="card-header">
        <span class="badge">
          <svg viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13L11 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          LookUp
        </span>
        <button id="btn-close" class="icon-btn" title="Dismiss">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Word display and pronunciation -->
      <div class="word-header-row">
        <div class="word-info">
          <h2 id="word-text" class="word"></h2>
          <span id="pronunciation" class="pronunciation"></span>
        </div>
        <div class="word-actions">
          <button id="btn-audio" class="audio-btn hidden" title="Play pronunciation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
          </button>
          <button id="btn-copy" class="action-btn" title="Copy Word">
            <svg viewBox="0 0 16 16" fill="none">
              <rect x="6" y="6" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 10H2a1 1 0 01-1-1V2a1 1 0 011-1h7a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Dictionary Container -->
      <div class="dict-container">
        <p id="no-word" class="no-word hidden">No word found under cursor</p>

        <!-- Tabs Bar -->
        <div id="tabs-bar" class="tabs-bar hidden">
          <button id="tab-vi" class="tab-btn active">Tiếng Việt</button>
          <button id="tab-en" class="tab-btn">English</button>
        </div>

        <!-- Scrollable Content -->
        <div class="scroll-container">
          <!-- Loading skeleton -->
          <div id="dict-loading" class="skeleton-wrap hidden">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line medium"></div>
          </div>

          <!-- Definitions list -->
          <div id="definitions-list" class="definitions-list"></div>
        </div>
      </div>

      <!-- Auto-dismiss bar (absolute positioned at the bottom of the card) -->
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>
  </body>
</html>
