<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LookUp — instantly extract text from any image or screenshot using OCR" />
    <title>LookUp — OCR Text Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <header class="header">
        <div class="logo-wrap">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 11H14M11 8V14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <h1 class="logo-text">LookUp</h1>
        </div>
        <p class="tagline">Extract text from any image — instantly</p>
      </header>

      <section class="actions">
        <button id="btn-screenshot" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          Scan Screen
        </button>
        <button id="btn-file" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 4h10l6 6v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="currentColor" stroke-width="2"/><path d="M14 4v6h6" stroke="currentColor" stroke-width="2"/></svg>
          Open Image
        </button>
        <input id="file-input" type="file" accept="image/*" style="display:none" />
      </section>

      <div id="ocr-status" class="status">Ready — choose an action above</div>

      <section class="result-wrap">
        <div class="result-header">
          <span class="result-label">Extracted Text</span>
          <button id="btn-copy" class="btn-copy" title="Copy to clipboard">
            <svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>
            Copy
          </button>
        </div>
        <pre id="ocr-result" class="result-box"></pre>
      </section>
    </main>
  </body>
</html>
