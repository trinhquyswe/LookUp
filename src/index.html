<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LookUp — extract text from any image or screenshot." />
    <title>LookUp — OCR Text Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <!-- ── Header ─────────────────────────────────────────────────────── -->
      <header class="header">
        <div class="logo-wrap">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 11H14M11 8V14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <h1 class="logo-text">LookUp</h1>
        </div>
        <p class="tagline">Configure your word lookup hotkey settings</p>
      </header>

      <!-- ── Hotkey Settings Panel ──────────────────────────────────────── -->
      <section class="settings-panel">
        <div class="settings-row">
          <div class="settings-label">
            <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 9h12M6 13h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span>Word lookup hotkey:</span>
          </div>
          <div class="hotkey-recorder">
            <input type="text" id="hotkey-input" readonly value="None" title="Click to record new hotkey" />
            <button id="btn-save-hotkey" class="btn-save-hotkey hidden">Save</button>
            <button id="btn-cancel-hotkey" class="btn-cancel-hotkey hidden">Cancel</button>
          </div>
        </div>
      </section>

      <div id="ocr-status" class="status">Ready</div>
    </main>
  </body>
</html>
